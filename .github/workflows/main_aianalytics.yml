name: Build and deploy Node.js app to Azure Web App - AIAnalytics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install (all) & build
        run: |
          npm ci
          npm run build

      # Reinstall as production-only so node_modules is smaller
      - name: Install production deps only
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Create deploy package
        run: |
          mkdir -p deploy
          cp -R dist deploy/dist
          cp -R node_modules deploy/node_modules
          cp package.json package-lock.json deploy/
          cd deploy
          zip -r ../deploy.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-zip
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-zip

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'AIAnalytics'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_68464ADAD035466AA3AE26D07D350343 }}
          package: deploy.zip
