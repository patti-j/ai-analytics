# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - ai-analytics

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ai-analytics
  cancel-in-progress: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: "npm"
          
      - name: Install dependencies (CI)
        run: npm ci       

      - name: Debug - show repo root
        run: |
          pwd
          ls -la
          echo "---- script/ ----"
          ls -la script || true
          echo "---- find build.ts ----"
          find . -maxdepth 4 -name "build.ts" -print

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules/**
            !dist/**
            
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Debug - show downloaded artifact contents
        run: |
          pwd
          ls -la app
          echo "---- app/script/ ----"
          ls -la app/script || true
          echo "---- find build.ts ----"
          find app -maxdepth 5 -name "build.ts" -print
          
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ai-analytics'
          slot-name: 'Production'
          package: .

          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F8C65168DF3B40A5B5C5739AB9B24A68 }}
