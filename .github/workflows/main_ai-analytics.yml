name: Build (CI) and Deploy (Azure builds) ai-analytics

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ai-analytics
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies (CI)
        run: npm ci

      - name: Run tests (if present)
        run: npm test --if-present

      - name: Debug - show repo root
        run: |
          pwd
          ls -la
          echo "---- script/ ----"
          ls -la script || true
          echo "---- find build.ts ----"
          find . -maxdepth 4 -name "build.ts" -print

      - name: Upload source artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !node_modules/**
            !dist/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: app

      - name: Debug - show downloaded artifact contents
        run: |
          pwd
          ls -la app
          echo "---- app/script/ ----"
          ls -la app/script || true
          echo "---- find build.ts ----"
          find app -maxdepth 5 -name "build.ts" -print

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: aianalytics
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: app
